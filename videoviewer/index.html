<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/js/theme-boot-inline.js"></script>
    <script src="/js/software-mode-boot-inline.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Video - Qubibyte</title>
    <link rel="icon" type="image/x-icon" href="/images/fav.png">
    <link href="/newindex.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/themes.css">
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: var(--bg-primary, #0a0a1a);
            color: var(--text-primary, #f1f5f9);
            font-family: var(--font-body, 'Inter', sans-serif);
        }

        .video-shell {
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        .video-top {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-secondary, #0f0f23);
            border-bottom: 1px solid var(--border-subtle, rgba(255, 255, 255, 0.08));
        }

        .video-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-default, rgba(255, 255, 255, 0.12));
            background: var(--bg-card, #141428);
            color: var(--text-primary);
            text-decoration: none;
            font-family: var(--font-display, 'Khand', sans-serif);
            letter-spacing: 0.5px;
        }

        .video-back:hover {
            border-color: var(--color-secondary, #0687C9);
        }

        .video-title {
            font-family: var(--font-display, 'Khand', sans-serif);
            font-size: 1.1rem;
            margin: 0;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .video-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
        }

        .video-frame-wrap {
            width: min(100%, 1280px);
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-md, 0 8px 30px rgba(0, 0, 0, 0.35));
        }

        .video-frame-wrap iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .video-error {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            max-width: 32rem;
            line-height: 1.5;
        }
    </style>
    <script src="/js/youtube-embed.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/software-mode.js"></script>
</head>

<body>
    <div class="video-shell">
        <header class="video-top">
            <a href="javascript:history.back()" class="video-back" id="video-back">◀ Back</a>
            <h1 class="video-title" id="video-title">Qubibyte Video</h1>
        </header>
        <main class="video-stage">
            <div class="video-frame-wrap" id="video-wrap" hidden>
                <iframe
                    id="video-player"
                    title="YouTube video player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen></iframe>
            </div>
            <p class="video-error" id="video-error" hidden>Missing or invalid video link.</p>
        </main>
    </div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            let videoId = params.get('v');
            const urlParam = params.get('url');

            if (!videoId && urlParam && window.QubibyteYoutubeEmbed) {
                videoId = window.QubibyteYoutubeEmbed.extractVideoId(urlParam);
            }

            const wrap = document.getElementById('video-wrap');
            const player = document.getElementById('video-player');
            const err = document.getElementById('video-error');
            const back = document.getElementById('video-back');

            if (back) {
                back.addEventListener('click', function (e) {
                    if (window.history.length > 1) {
                        e.preventDefault();
                        history.back();
                    } else {
                        back.setAttribute('href', '/');
                    }
                });
            }

            if (!videoId) {
                err.hidden = false;
                err.textContent = 'Missing or invalid video link.';
                return;
            }

            const embedUrl = window.QubibyteYoutubeEmbed
                ? window.QubibyteYoutubeEmbed.buildEmbedUrl(videoId)
                : `https://www.youtube-nocookie.com/embed/${encodeURIComponent(videoId)}?rel=0&modestbranding=1&playsinline=1&origin=https%3A%2F%2Fqubibyte.org`;

            if (!embedUrl) {
                err.hidden = false;
                err.textContent = 'Could not build a valid embed URL for this video.';
                return;
            }

            player.src = embedUrl;
            wrap.hidden = false;

            const title = params.get('title');
            if (title) {
                document.getElementById('video-title').textContent = title;
                document.title = title + ' - Qubibyte';
            }
        })();
    </script>
</body>

</html>
